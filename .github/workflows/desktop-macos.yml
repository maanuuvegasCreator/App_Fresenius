# Genera .zip para Mac (ARM e Intel en paralelo). Evita el build "universal" que tarda mucho.
# GitHub → Actions → "Desktop macOS (zip)" → Run workflow → descarga los 2 artifacts.
name: Desktop macOS (zip)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build macOS (${{ matrix.arch }})
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac:${{ matrix.arch }}

      - name: List output
        run: ls -la desktop/out/

      - uses: actions/upload-artifact@v4
        with:
          name: thinkia-fresenius-mac-${{ matrix.arch }}
          path: desktop/out/*.zip
