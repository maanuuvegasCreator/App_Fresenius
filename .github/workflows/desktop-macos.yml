# Genera el .zip para Mac desde GitHub (runner macOS). Útil si solo tienes Windows.
# Repo → Actions → "Desktop macOS (zip)" → Run workflow → descarga el artifact.
name: Desktop macOS (zip)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install & build
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm ci
          npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: thinkia-fresenius-macos-zip
          path: desktop/out/*.zip
